# Minimal CI — upstream tracking mirror of github.com/ashos/ashos
# Runs on push to main, merge requests, schedule, and manual trigger.

stages:
  - info

upstream-info:
  stage: info
  image: alpine:3.19
  before_script:
    - apk add --no-cache git
  script:
    - echo "Repo: $CI_PROJECT_PATH"
    - echo "Branch: $CI_COMMIT_BRANCH"
    - echo "Commit: $CI_COMMIT_SHORT_SHA — $CI_COMMIT_TITLE"
    - echo "Author: $CI_COMMIT_AUTHOR"
    - echo "Timestamp: $CI_COMMIT_TIMESTAMP"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
